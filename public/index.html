<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Heck of a Game</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="welcome" class="welcome">
        <div class="brand">
          <div class="deck-mark" aria-hidden="true">
            <span>♠</span><span>♥</span><span>♦</span><span>♣</span>
          </div>
          <h1>Heck of a Game</h1>
          <p>No accounts. A trick-taking card game with bidding, top, and one shared 52-card deck.</p>
        </div>

        <form id="createForm" class="panel">
          <h2>Host a Table</h2>
          <label>
            Your name
            <input id="hostName" autocomplete="name" maxlength="24" placeholder="Dealer">
          </label>
          <button type="submit">Create Room</button>
        </form>

        <form id="joinForm" class="panel">
          <h2 id="joinTitle">Join a Table</h2>
          <label>
            Your name
            <input id="joinName" autocomplete="name" maxlength="24" placeholder="Player">
          </label>
          <label>
            Room code
            <input id="roomCode" maxlength="5" placeholder="A7Q9K" autocapitalize="characters">
          </label>
          <button type="submit">Join Room</button>
          <button id="startOwn" type="button" class="link-button hidden">Or start your own</button>
        </form>
      </section>

      <section id="game" class="game hidden" aria-live="polite">
        <section class="table-zone">
          <div class="table-header">
            <div class="room-block">
              <p class="room-code">Room <strong id="roomTitle">-----</strong></p>
              <button id="copyLink" type="button" class="secondary table-copy">Copy Link</button>
            </div>
            <div class="top-card-block">
              <h2 id="topCardLabel">Top Card - Top Suit</h2>
              <div id="topCard" class="top-card"></div>
            </div>
          </div>
          <div id="tableCards" class="table-cards"></div>
          <div class="turn-panel">
            <span id="turnLabel">Waiting</span>
            <strong id="turnName">for players</strong>
            <p id="tableHint" class="table-hint">Start when everyone is in.</p>
          </div>
        </section>

        <section class="players-zone">
          <h2>Players</h2>
          <div id="players" class="players"></div>
        </section>

        <section class="hand-zone">
          <div class="hand-header">
            <h2>Your Hand</h2>
            <div class="actions">
              <button id="startGame" type="button">Deal</button>
              <button id="resetGame" type="button" class="secondary">Reset</button>
              <button id="clearMemory" type="button" class="secondary">Clear Memory</button>
            </div>
          </div>
          <div id="bidPanel" class="bid-panel hidden"></div>
          <div id="hand" class="hand"></div>
        </section>

        <section class="log-zone">
          <h2>Table Log</h2>
          <ol id="log"></ol>
        </section>
      </section>
    </main>

    <div id="trickModal" class="trick-modal hidden" role="status" aria-live="polite">
      <div class="trick-modal-panel">
        <span id="modalEyebrow">Trick won by</span>
        <strong id="modalTitle">Player</strong>
        <div id="roundSummary" class="round-summary hidden"></div>
      </div>
    </div>
    <div id="bidConfirmModal" class="confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="bidConfirmTitle">
      <div class="confirm-modal-panel">
        <h2 id="bidConfirmTitle">Bid 0?</h2>
        <div class="confirm-actions">
          <button id="confirmBid" type="button">Bid</button>
          <button id="cancelBid" type="button" class="secondary">Cancel</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
